name: Swift Code Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-format:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install SwiftFormat and SwiftLint
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: brew install swiftformat swiftlint

      - name: Check SwiftFormat
        run: swiftformat --lint . --swift-version 5.9 --cache ignore

      - name: Check SwiftLint
        run: swiftlint lint --strict --no-cache
